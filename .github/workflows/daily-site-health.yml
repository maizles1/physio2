name: Daily site health

on:
  schedule:
    # 04:00 UTC ≈ 06:00 Israel (IST, winter). Summer (IDT) is ~07:00 local.
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: daily-site-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint (autofix)
        run: npx eslint . --fix

      - name: Commit ESLint autofixes
        id: lint_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "No lint autofix changes to commit."
          else
            git commit -m "chore(ci): eslint --fix [daily health]"
            git push origin HEAD:${{ github.ref_name }}
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "Committed and pushed lint fixes."
          fi

      - name: Notify lint autofix
        if: always() && steps.lint_commit.outputs.pushed == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CI_ALERT_KIND: lint-autofix
          CI_ALERT_TO: ${{ secrets.CI_ALERT_TO }}
          CI_ALERT_EMAIL_FROM: ${{ secrets.CI_ALERT_EMAIL_FROM }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node scripts/ci-send-alert.js

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  notify_failure:
    name: Email on failure
    runs-on: ubuntu-latest
    needs: [verify]
    if: always() && needs.verify.result == 'failure'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send failure alert
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CI_ALERT_KIND: failure
          CI_ALERT_TO: ${{ secrets.CI_ALERT_TO }}
          CI_ALERT_EMAIL_FROM: ${{ secrets.CI_ALERT_EMAIL_FROM }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node scripts/ci-send-alert.js
