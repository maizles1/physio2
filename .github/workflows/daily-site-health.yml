name: Daily site health

on:
  schedule:
    # 04:00 UTC ≈ 06:00 Israel (IST, winter). Summer (IDT) is ~07:00 local.
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: daily-site-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint (autofix)
        run: npx eslint . --fix

      - name: Commit ESLint autofixes
        id: lint_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "No lint autofix changes to commit."
          else
            git commit -m "chore(ci): eslint --fix [daily health]"
            git push origin HEAD:${{ github.ref_name }}
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "Committed and pushed lint fixes."
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  notify_failure:
    name: Open issue on failure
    runs-on: ubuntu-latest
    needs: [verify]
    if: always() && needs.verify.result == 'failure'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          set -e
          TITLE="[Daily site health] Workflow failing on ${REF}"
          BODY=$(cat <<EOF
          הרצת הבדיקות היומית נכשלה.

          - Workflow: \`${WORKFLOW}\`
          - Branch: \`${REF}\`
          - Run: ${RUN_URL}

          סגרו את ה-Issue אחרי שהבעיה תוקנה.
          EOF
          )

          NUM=$(gh issue list --repo "$REPO" --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "$REPO" --body "$BODY"
            echo "Commented on existing issue #$NUM"
          else
            gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY"
            echo "Created new issue"
          fi
